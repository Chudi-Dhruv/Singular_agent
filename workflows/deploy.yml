name: Deploy ABDM

on:
  push:
    branches: [main]

jobs:
  # ── Always runs: basic syntax check ──────────────────────────────────────
  check:
    name: Check
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '#deploy')"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyflakes
      - run: python -m pyflakes .

  # ── Only runs when commit message contains #deploy ────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    if: "contains(github.event.head_commit.message, '#deploy')"

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            echo "=== Pulling latest code ==="
            cd /home/ec2-user/abdm
            git pull origin main

            echo "=== Installing any new dependencies ==="
            source venv/bin/activate
            pip install -r requirements.txt --quiet

            echo "=== Restarting service ==="
            sudo systemctl restart abdm-api

            echo "=== Waiting for startup ==="
            sleep 5

            echo "=== Health check ==="
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health)
            if [ "$STATUS" = "200" ]; then
              echo "✓ Deploy successful — health check passed"
            else
              echo "✗ Health check failed with status $STATUS"
              sudo journalctl -u abdm-api --since "1 minute ago" --no-pager
              exit 1
            fi

      - name: Notify success
        if: success()
        run: echo "✓ ABDM deployed successfully to ${{ secrets.EC2_HOST }}"

      - name: Notify failure  
        if: failure()
        run: echo "✗ Deploy failed — check logs above"
